<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAT254 — Lineer Cebir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-card-hover: #16161f;
            --border: #1e1e2a;
            --border-hover: #2a2a3a;
            --text: #e8e6e3;
            --text-muted: #6b6980;
            --accent: #c9a84c;
            --accent-dim: rgba(201, 168, 76, 0.12);
            --accent-glow: rgba(201, 168, 76, 0.06);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Hero ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 2rem;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.125rem;
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.2s;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(4.5rem, 12vw, 10.5rem);
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.4s;
        }

        .hero-title em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4.5vw, 3rem);
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.6s;
        }

        .hero-line {
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.8s;
        }

        .hero-scroll {
            position: absolute;
            bottom: 2.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.975rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 1s;
            cursor: pointer;
            transition: color 0.3s;
        }
        .hero-scroll:hover { color: var(--accent); }
        .hero-scroll span {
            display: block;
            margin-top: 0.5rem;
            animation: bounce 2s infinite;
        }

        /* ── Notes ── */
        .notes-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
        }

        .section-header {
            margin-bottom: 4rem;
            text-align: center;
        }

        .section-header h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .week-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.125rem;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            display: inline-block;
            margin-top: 1rem;
        }

        /* ── Week Block ── */
        .week-block {
            margin-bottom: 3.5rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }
        .week-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .week-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .week-number {
            font-family: 'Playfair Display', serif;
            font-size: 3.75rem;
            font-weight: 900;
            line-height: 1;
            opacity: 0.15;
        }

        .week-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .week-parts-count {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.975rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        /* ── Cards ── */
        .parts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.85rem;
        }

        .part-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.35s, box-shadow 0.35s, transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            height: 160px;
        }

        .part-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--card-color);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3;
        }

        .part-card:hover {
            border-color: var(--card-color, var(--border-hover));
            transform: translateY(-3px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.35);
        }
        .part-card:hover::before { opacity: 1; }

        /* Front face */
        .part-front {
            position: absolute;
            inset: 0;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transform: translateY(0);
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }
        .part-card:hover .part-front {
            transform: translateY(-100%);
        }

        .part-icon { font-size: 2.1rem; opacity: 0.5; }

        .part-name {
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 1.425rem;
        }

        .part-file {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.975rem;
            color: var(--text-muted);
        }

        /* Reveal face */
        .part-reveal {
            position: absolute;
            inset: 0;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 0.4rem;
            overflow: hidden;
            background: linear-gradient(160deg, var(--bg-card-hover) 0%, color-mix(in srgb, var(--card-color, #c9a84c) 8%, var(--bg-card)) 100%);
            transform: translateY(100%);
            opacity: 0;
            transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.38s ease;
            z-index: 1;
        }
        .part-card:hover .part-reveal {
            transform: translateY(0);
            opacity: 1;
        }

        .reveal-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
        }

        .reveal-subtitle {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .reveal-arrow {
            align-self: flex-end;
            font-size: 1.1rem;
            color: var(--card-color, var(--accent));
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        /* ── Empty ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .empty-state p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border);
            max-width: 1000px;
            margin: 0 auto;
        }
        .footer p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.975rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        @media (max-width: 600px) {
            .parts-grid { grid-template-columns: 1fr; }
            .week-number { font-size: 2.5rem; }
            .notes-section { padding: 3rem 1.25rem 4rem; }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .parts-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-tag">2026 — Ders Notları</div>
        <h1 class="hero-title">Lineer <em>Cebir</em></h1>
        <p class="hero-subtitle">MAT254</p>
        <div class="hero-line"></div>
        <div class="hero-scroll" onclick="document.getElementById('notes').scrollIntoView()">
            Notlara göz at
            <span>↓</span>
        </div>
    </section>

    <section class="notes-section" id="notes">
        <div class="section-header">
            <h2>Haftalık Notlar</h2>
            <div class="week-count" id="weekCount"></div>
        </div>
        <div id="notesContainer"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <p>Henüz not dosyası bulunamadı.</p>
        </div>
    </section>

    <footer class="footer">
        <p>MAT254 Lineer Cebir — Ders Notları</p>
    </footer>

<script>
    const weekColors = [
        '#c9a84c', '#6ba3be', '#b07cc6',
        '#6bbf8a', '#cf7b5f', '#8b8fd4',
    ];

    async function loadNotes() {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error('manifest.json bulunamadı');
        const pages = await res.json();
        const found = {};
        pages.forEach(p => {
            const m = p.file.match(/^w(\d+)-(\d+)\.html$/);
            if (!m) return;
            const w = +m[1], part = +m[2];
            if (!found[w]) found[w] = [];
            found[w].push({ week: w, part, file: 'pages/' + p.file, title: p.title, subtitle: p.subtitle });
        });
        return found;
    }

    function renderNotes(notes) {
        const container = document.getElementById('notesContainer');
        const weekCount = document.getElementById('weekCount');
        const emptyState = document.getElementById('emptyState');
        const weeks = Object.keys(notes).map(Number).sort((a, b) => a - b);

        if (weeks.length === 0) {
            emptyState.style.display = 'block';
            weekCount.textContent = '0 hafta';
            return;
        }

        const totalParts = weeks.reduce((sum, w) => sum + notes[w].length, 0);
        weekCount.textContent = `${weeks.length} hafta · ${totalParts} not`;

        weeks.forEach((w, idx) => {
            const parts = notes[w];
            const color = weekColors[(w - 1) % weekColors.length];

            const block = document.createElement('div');
            block.className = 'week-block';
            block.setAttribute('data-week', w);

            block.innerHTML = `
                <div class="week-header">
                    <div class="week-number" style="color: ${color}">${String(w).padStart(2, '0')}</div>
                    <div class="week-label" style="color: ${color}">Hafta ${w}</div>
                    <div class="week-parts-count">${parts.length} bölüm</div>
                </div>
                <div class="parts-grid">
                    ${parts.map(p => `
                        <a href="${p.file}" class="part-card" style="--card-color: ${color}">
                            <div class="part-front">
                                <div class="part-icon">📄</div>
                                <div class="part-name">Bölüm ${p.part}</div>
                                <div class="part-file">${p.file}</div>
                            </div>
                            <div class="part-reveal">
                                <div class="reveal-title">${p.title ?? `Bölüm ${p.part}`}</div>
                                ${p.subtitle ? `<div class="reveal-subtitle">${p.subtitle}</div>` : ''}
                                <div class="reveal-arrow">→</div>
                            </div>
                        </a>
                    `).join('')}
                </div>
            `;

            container.appendChild(block);
            setTimeout(() => block.classList.add('visible'), 100 + idx * 150);
        });

        // Per-week hover glow + reveal background fallback
        const style = document.createElement('style');
        weeks.forEach(w => {
            const color = weekColors[(w - 1) % weekColors.length];
            style.textContent += `
                [data-week="${w}"] .part-card:hover {
                    border-color: ${color}55;
                    box-shadow: 0 12px 36px ${color}18;
                }
                [data-week="${w}"] .part-reveal {
                    background: linear-gradient(160deg, var(--bg-card-hover) 0%, ${color}14 100%);
                }
            `;
        });
        document.head.appendChild(style);
    }

    loadNotes().then(renderNotes);
</script>

</body>
</html>
